<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Calcumaker 16 logo concept sheet</title>
  <desc id="desc">A presentation sheet for the Calcumaker 16 logo direction, showing the primary lockup, icon, mono variant, color palette, and usage notes.</desc>
  <defs>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 22px; letter-spacing: 3px; fill: #8fb0c8; }
      .note { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 28px; fill: #cfd6e2; }
      .small { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 20px; fill: #98a2b3; }
      .word { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-weight: 850; letter-spacing: 10px; fill: #e7e9ee; }
      .word.gold { fill: #f0c25a; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 800; }
    </style>
  </defs>

  <rect width="1400" height="1000" fill="#101217"/>
  <rect x="42" y="42" width="1316" height="916" rx="34" fill="#191c22" stroke="#30343d" stroke-width="2"/>

  <text x="86" y="112" class="label">PRIMARY LOCKUP</text>
  <g transform="translate(84 150)">
    <g transform="scale(.33)">
      <rect x="34" y="34" width="444" height="444" rx="92" fill="#23262b"/>
      <rect x="34" y="34" width="444" height="444" rx="92" fill="none" stroke="#0b0d10" stroke-width="18"/>
      <path d="M256 74 392 148v216L256 438 120 364V148Z" fill="none" stroke="#f0c25a" stroke-width="18" stroke-linejoin="round"/>
      <g fill="#ff3b30" filter="url(#soft-glow)">
        <rect x="136" y="136" width="128" height="34" rx="13"/>
        <rect x="102" y="164" width="36" height="92" rx="14"/>
        <rect x="102" y="274" width="36" height="92" rx="14"/>
        <rect x="136" y="360" width="128" height="34" rx="13"/>
      </g>
      <g fill="#f0c25a">
        <rect x="301" y="151" width="16" height="68" rx="8"/>
        <rect x="301" y="239" width="16" height="68" rx="8"/>
        <rect x="350" y="151" width="64" height="16" rx="8"/>
        <rect x="332" y="167" width="16" height="68" rx="8"/>
        <rect x="350" y="225" width="64" height="16" rx="8"/>
        <rect x="332" y="241" width="16" height="68" rx="8"/>
        <rect x="414" y="241" width="16" height="68" rx="8"/>
        <rect x="350" y="309" width="64" height="16" rx="8"/>
      </g>
      <text x="256" y="424" text-anchor="middle" class="mono" font-size="30" letter-spacing="3" fill="#e7e9ee">0x10</text>
    </g>
    <text x="208" y="82" class="word" font-size="56">CALCUMAKER</text>
    <text x="804" y="82" class="word gold" font-size="56" letter-spacing="2">16</text>
    <text x="212" y="134" class="mono" font-size="23" letter-spacing="4" fill="#8fb0c8">EVERY BASE. EVERY DIGIT.</text>
    <rect x="736" y="115" width="18" height="24" rx="3" fill="#ff3b30"/>
  </g>

  <text x="86" y="408" class="label">ICON / PCB SILK / APP TILE</text>
  <g transform="translate(88 454) scale(.42)">
    <rect x="34" y="34" width="444" height="444" rx="92" fill="#23262b"/>
    <rect x="34" y="34" width="444" height="444" rx="92" fill="none" stroke="#0b0d10" stroke-width="18"/>
    <path d="M256 74 392 148v216L256 438 120 364V148Z" fill="none" stroke="#f0c25a" stroke-width="18" stroke-linejoin="round"/>
    <g fill="#ff3b30" filter="url(#soft-glow)">
      <rect x="136" y="136" width="128" height="34" rx="13"/>
      <rect x="102" y="164" width="36" height="92" rx="14"/>
      <rect x="102" y="274" width="36" height="92" rx="14"/>
      <rect x="136" y="360" width="128" height="34" rx="13"/>
    </g>
    <g fill="#f0c25a">
      <rect x="301" y="151" width="16" height="68" rx="8"/>
      <rect x="301" y="239" width="16" height="68" rx="8"/>
      <rect x="350" y="151" width="64" height="16" rx="8"/>
      <rect x="332" y="167" width="16" height="68" rx="8"/>
      <rect x="350" y="225" width="64" height="16" rx="8"/>
      <rect x="332" y="241" width="16" height="68" rx="8"/>
      <rect x="414" y="241" width="16" height="68" rx="8"/>
      <rect x="350" y="309" width="64" height="16" rx="8"/>
    </g>
    <text x="256" y="424" text-anchor="middle" class="mono" font-size="30" letter-spacing="3" fill="#e7e9ee">0x10</text>
  </g>
  <g transform="translate(342 454) scale(.42)">
    <path d="M256 74 392 148v216L256 438 120 364V148Z" fill="none" stroke="#e7e9ee" stroke-width="20" stroke-linejoin="round"/>
    <g fill="#e7e9ee">
      <rect x="136" y="136" width="128" height="34" rx="13"/>
      <rect x="102" y="164" width="36" height="92" rx="14"/>
      <rect x="102" y="274" width="36" height="92" rx="14"/>
      <rect x="136" y="360" width="128" height="34" rx="13"/>
      <rect x="301" y="151" width="16" height="68" rx="8"/>
      <rect x="301" y="239" width="16" height="68" rx="8"/>
      <rect x="350" y="151" width="64" height="16" rx="8"/>
      <rect x="332" y="167" width="16" height="68" rx="8"/>
      <rect x="350" y="225" width="64" height="16" rx="8"/>
      <rect x="332" y="241" width="16" height="68" rx="8"/>
      <rect x="414" y="241" width="16" height="68" rx="8"/>
      <rect x="350" y="309" width="64" height="16" rx="8"/>
    </g>
  </g>

  <text x="642" y="408" class="label">COLOR TOKENS</text>
  <g transform="translate(644 452)">
    <rect x="0" y="0" width="96" height="96" rx="16" fill="#23262b"/>
    <text x="0" y="132" class="small">case</text>
    <text x="0" y="160" class="small">#23262b</text>
    <rect x="140" y="0" width="96" height="96" rx="16" fill="#f0c25a"/>
    <text x="140" y="132" class="small">shift gold</text>
    <text x="140" y="160" class="small">#f0c25a</text>
    <rect x="310" y="0" width="96" height="96" rx="16" fill="#ff3b30"/>
    <text x="310" y="132" class="small">LED red</text>
    <text x="310" y="160" class="small">#ff3b30</text>
    <rect x="470" y="0" width="96" height="96" rx="16" fill="#6ea8ff"/>
    <text x="470" y="132" class="small">shift blue</text>
    <text x="470" y="160" class="small">#6ea8ff</text>
  </g>

  <text x="642" y="698" class="label">WHY IT WORKS</text>
  <text x="644" y="750" class="note">Seven-segment C: calculator hardware.</text>
  <text x="644" y="792" class="note">Hex frame and 0x10: base-16 identity.</text>
  <text x="644" y="834" class="note">Gold and blue: f/g accent colors from the faceplate.</text>
  <text x="644" y="876" class="note">Tagline: Every base. Every digit.</text>
</svg>
