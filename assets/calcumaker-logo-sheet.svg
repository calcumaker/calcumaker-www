<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" role="img" aria-labelledby="title desc">
  <title id="title">Calcumaker 16 logo concept sheet</title>
  <desc id="desc">A presentation sheet for the updated Calcumaker 16 logo direction, showing the primary lockup, icon, mono variant, color palette, and usage notes.</desc>
  <defs>
    <linearGradient id="case" x1="72" y1="42" x2="442" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b3036"/>
      <stop offset="1" stop-color="#15191e"/>
    </linearGradient>
    <linearGradient id="gold" x1="92" y1="118" x2="442" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd36b"/>
      <stop offset=".52" stop-color="#f0c25a"/>
      <stop offset="1" stop-color="#b87918"/>
    </linearGradient>
    <filter id="led-glow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <symbol id="cm-mark" viewBox="0 0 512 512">
      <rect x="22" y="22" width="468" height="468" rx="96" fill="url(#case)"/>
      <rect x="22" y="22" width="468" height="468" rx="96" fill="none" stroke="#080a0d" stroke-width="14"/>
      <rect x="54" y="54" width="404" height="404" rx="72" fill="none" stroke="#343a42" stroke-width="2" opacity=".72"/>
      <path d="M146 102h235l62 66-34 32-46-48H190l-50 58H82Z" fill="#11161b"/>
      <path d="M82 302h58l50 58h173l46-48 34 32-62 66H146Z" fill="#11161b"/>
      <path d="M120 150h52l-46 54H74Z" fill="#3a4149"/>
      <path d="M74 306h52l46 54h-52Z" fill="#3a4149"/>
      <path d="M181 130h190l72 76h-74l-34-34H214l-38 50h-68Z" fill="url(#gold)"/>
      <path d="M108 290h68l38 50h121l34-34h74l-72 76H181Z" fill="url(#gold)"/>
      <path d="M373 206h70v100h-70l23-28v-44Z" fill="#c88f25"/>
      <path d="M190 190h150l38 38v56l-38 38H190l-38-38v-56Z" fill="#120609" stroke="#3c444d" stroke-width="8" stroke-linejoin="round"/>
      <g filter="url(#led-glow)" fill="#ff3b30">
        <rect x="227" y="220" width="17" height="71" rx="8"/>
        <rect x="278" y="214" width="72" height="18" rx="8"/>
        <rect x="260" y="229" width="18" height="52" rx="8"/>
        <rect x="278" y="270" width="70" height="18" rx="8"/>
        <rect x="260" y="287" width="18" height="52" rx="8"/>
        <rect x="334" y="287" width="18" height="52" rx="8"/>
        <rect x="278" y="328" width="72" height="18" rx="8"/>
      </g>
      <g fill="none" stroke="#f0c25a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M78 252h38l26 26h52"/>
        <path d="M78 282h70l38 38h34"/>
      </g>
      <rect x="380" y="213" width="58" height="15" rx="8" fill="#ff3b30" filter="url(#led-glow)"/>
      <rect x="380" y="239" width="58" height="15" rx="8" fill="#ff3b30" filter="url(#led-glow)"/>
      <rect x="380" y="265" width="58" height="15" rx="8" fill="#f0c25a"/>
      <rect x="380" y="291" width="58" height="15" rx="8" fill="#6ea8ff"/>
    </symbol>
    <symbol id="cm-mark-mono" viewBox="0 0 512 512">
      <g fill="#e7e9ee">
        <path d="M181 130h190l72 76h-74l-34-34H214l-38 50h-68Z"/>
        <path d="M108 290h68l38 50h121l34-34h74l-72 76H181Z"/>
        <path d="M373 206h70v100h-70l23-28v-44Z"/>
        <path d="M190 190h150l38 38v56l-38 38H190l-38-38v-56Z" fill="none" stroke="#e7e9ee" stroke-width="22" stroke-linejoin="round"/>
        <rect x="227" y="220" width="17" height="71" rx="8"/>
        <rect x="278" y="214" width="72" height="18" rx="8"/>
        <rect x="260" y="229" width="18" height="52" rx="8"/>
        <rect x="278" y="270" width="70" height="18" rx="8"/>
        <rect x="260" y="287" width="18" height="52" rx="8"/>
        <rect x="334" y="287" width="18" height="52" rx="8"/>
        <rect x="278" y="328" width="72" height="18" rx="8"/>
      </g>
    </symbol>
    <style>
      .label { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 22px; letter-spacing: 3px; fill: #8fb0c8; }
      .note { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 28px; fill: #cfd6e2; }
      .small { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-size: 20px; fill: #98a2b3; }
      .word { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; font-weight: 850; letter-spacing: 9px; fill: #e7e9ee; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-weight: 750; letter-spacing: 4px; fill: #8fb0c8; }
    </style>
  </defs>

  <rect width="1400" height="1000" fill="#101217"/>
  <rect x="42" y="42" width="1316" height="916" rx="34" fill="#191c22" stroke="#30343d" stroke-width="2"/>

  <text x="86" y="112" class="label">PRIMARY LOCKUP</text>
  <use href="#cm-mark" x="82" y="150" width="176" height="176"/>
  <text x="304" y="232" class="word" font-size="56">CALCUMAKER</text>
  <text x="934" y="232" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="850" fill="#f0c25a">16</text>
  <text x="308" y="285" class="mono" font-size="23">EVERY BASE. EVERY DIGIT.</text>
  <rect x="802" y="266" width="18" height="24" rx="4" fill="#ff3b30"/>

  <text x="86" y="438" class="label">ICON / PCB SILK / APP TILE</text>
  <use href="#cm-mark" x="86" y="482" width="224" height="224"/>
  <use href="#cm-mark-mono" x="370" y="482" width="224" height="224"/>

  <text x="642" y="438" class="label">COLOR TOKENS</text>
  <g transform="translate(644 482)">
    <rect x="0" y="0" width="96" height="96" rx="16" fill="#23262b"/>
    <text x="0" y="132" class="small">case</text>
    <text x="0" y="160" class="small">#23262b</text>
    <rect x="140" y="0" width="96" height="96" rx="16" fill="#f0c25a"/>
    <text x="140" y="132" class="small">shift gold</text>
    <text x="140" y="160" class="small">#f0c25a</text>
    <rect x="310" y="0" width="96" height="96" rx="16" fill="#ff3b30"/>
    <text x="310" y="132" class="small">LED red</text>
    <text x="310" y="160" class="small">#ff3b30</text>
    <rect x="470" y="0" width="96" height="96" rx="16" fill="#6ea8ff"/>
    <text x="470" y="132" class="small">shift blue</text>
    <text x="470" y="160" class="small">#6ea8ff</text>
  </g>

  <text x="642" y="728" class="label">WHY IT WORKS</text>
  <text x="644" y="780" class="note">Faceplate badge: more hardware, less generic calculator.</text>
  <text x="644" y="822" class="note">Gold C-shell and red seven-seg 16: product identity.</text>
  <text x="644" y="864" class="note">Trace and annunciator accents: maker-grade detail.</text>
  <text x="644" y="906" class="note">Tagline: Every base. Every digit.</text>
</svg>
