<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 240" role="img" aria-labelledby="title desc">
  <title id="title">Calcumaker 16 logo</title>
  <desc id="desc">Calcumaker 16 horizontal logo with seven-segment mark and the tagline Every base. Every digit.</desc>
  <defs>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(24 24) scale(.375)">
    <rect x="34" y="34" width="444" height="444" rx="92" fill="#23262b"/>
    <rect x="34" y="34" width="444" height="444" rx="92" fill="none" stroke="#0b0d10" stroke-width="18"/>
    <path d="M256 74 392 148v216L256 438 120 364V148Z" fill="none" stroke="#f0c25a" stroke-width="18" stroke-linejoin="round"/>
    <g fill="#ff3b30" filter="url(#soft-glow)">
      <rect x="136" y="136" width="128" height="34" rx="13"/>
      <rect x="102" y="164" width="36" height="92" rx="14"/>
      <rect x="102" y="274" width="36" height="92" rx="14"/>
      <rect x="136" y="360" width="128" height="34" rx="13"/>
    </g>
    <g fill="#f0c25a">
      <rect x="301" y="151" width="16" height="68" rx="8"/>
      <rect x="301" y="239" width="16" height="68" rx="8"/>
      <rect x="350" y="151" width="64" height="16" rx="8"/>
      <rect x="332" y="167" width="16" height="68" rx="8"/>
      <rect x="350" y="225" width="64" height="16" rx="8"/>
      <rect x="332" y="241" width="16" height="68" rx="8"/>
      <rect x="414" y="241" width="16" height="68" rx="8"/>
      <rect x="350" y="309" width="64" height="16" rx="8"/>
    </g>
    <text x="256" y="424" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="30" font-weight="800" letter-spacing="3" fill="#e7e9ee">0x10</text>
  </g>

  <text x="244" y="102" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="850" letter-spacing="10" fill="#e7e9ee">CALCUMAKER</text>
  <text x="820" y="102" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="56" font-weight="850" letter-spacing="2" fill="#f0c25a">16</text>
  <text x="248" y="153" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="700" letter-spacing="4" fill="#8fb0c8">EVERY BASE. EVERY DIGIT.</text>
  <rect x="762" y="135" width="18" height="24" rx="3" fill="#ff3b30"/>
</svg>
