<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="t">
  <title id="t">Calcumaker 16</title>
  <!-- Favicon reduction of assets/calcumaker-mark.svg. The full mark's `0x10`
       caption and segmented `16` collapse into noise below ~32px, so this keeps
       only the two elements that survive a 16px tab icon: the gold hex frame and
       the seven-segment C. Same geometry and palette as the mark. -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#23262b"/>
  <path d="M256 64 400 142v228L256 448 112 370V142Z" fill="none" stroke="#f0c25a" stroke-width="26" stroke-linejoin="round"/>
  <g fill="#ff3b30">
    <rect x="150" y="140" width="140" height="40" rx="16"/>
    <rect x="112" y="172" width="42" height="100" rx="17"/>
    <rect x="112" y="288" width="42" height="100" rx="17"/>
    <rect x="150" y="380" width="140" height="40" rx="16"/>
  </g>
</svg>
